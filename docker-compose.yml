version: "3.9"

services:

  # ── Trading Intelligence API ─────────────────────────────────
  api:
    build: .
    container_name: ti_api
    command: python scripts/start_api.py
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_DEBUG=false
    env_file:
      - .env
    volumes:
      - ./models_saved:/app/models_saved
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit Dashboard ───────────────────────────────────────
  dashboard:
    build: .
    container_name: ti_dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE=http://api:8000
    volumes:
      - ./logs:/app/logs
    depends_on:
      - api
    restart: unless-stopped
